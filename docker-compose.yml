version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: halocab-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=halocab
    networks:
      - halocab-network

  redis:
    image: redis:7-alpine
    container_name: halocab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - halocab-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: halocab-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/halocab
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=halocab_docker_production_secret_key
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
      - STRIPE_SECRET_KEY=sk_test_simulated
    depends_on:
      - mongodb
      - redis
    networks:
      - halocab-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: halocab-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - halocab-network

volumes:
  mongodb_data:
  redis_data:

networks:
  halocab-network:
    driver: bridge
